openapi: 3.0.3
info:
  title: NERP API
  version: 1.0.0
  description: API for sending commands from the React frontend to the Express backend.
servers:
  - url: http://localhost:3000
    description: Local development server
tags:
  - name: Health
    description: Server status checks
  - name: Commands
    description: Command records stored in PostgreSQL
  - name: Users
    description: Mock username and password validation
  - name: Claude
    description: Claude AI prompt and response endpoints
  - name: Gemini
    description: >-
      Affirming-care helpers powered by Google Gemini (chat with intake context, plain-language reading helper,
      visit prep kit)
paths:
  /api/health:
    get:
      tags:
        - Health
      summary: Check API health
      responses:
        "200":
          description: API is running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok
                service: nerp-api
  /api/commands:
    get:
      tags:
        - Commands
      summary: List recent commands
      responses:
        "200":
          description: Recent commands
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Command"
    post:
      tags:
        - Commands
      summary: Send a command
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommandRequest"
            example:
              command: restart-worker
      responses:
        "201":
          description: Command created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Command"
        "400":
          description: Missing command value
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Command is required.
  /api/users/validate:
    post:
      tags:
        - Users
      summary: Check whether a username and password match a stored user
      description: Validates submitted credentials against the mock users table. This does not create a session or token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidateUserRequest"
            example:
              username: mockuser
              password: mockpassword
      responses:
        "200":
          description: Credential validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidateUserResponse"
              examples:
                valid:
                  value:
                    valid: true
                    user:
                      id: 1
                      username: mockuser
                invalid:
                  value:
                    valid: false
                    user: null
        "400":
          description: Missing username or password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Username and password are required.
  /api/claude:
    post:
      tags:
        - Claude
      summary: Ask Claude a question
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaudeRequest"
            example:
              question: What is the NERP stack?
      responses:
        "200":
          description: Claude response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaudeResponse"
        "400":
          description: Missing question value
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Question is required.
        "500":
          description: Missing API key or server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Missing ANTHROPIC_API_KEY. Add your Claude API key to backend/.env.
  /api/gemini/care-chat:
    post:
      tags:
        - Gemini
      summary: Supportive chat for navigating affirming care (uses optional saved intake context)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CareChatRequest"
      responses:
        "200":
          description: Reply text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CareChatResponse"
        "400":
          description: Missing message or oversized payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Missing Gemini API key or server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Missing GEMINI_API_KEY. Add your Gemini API key to backend/.env.
  /api/gemini/reading-helper:
    post:
      tags:
        - Gemini
      summary: Plain-language summary of pasted healthcare text plus questions for a provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReadingHelperRequest"
      responses:
        "200":
          description: Summary, term glossary, and suggested questions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadingHelperResponse"
        "400":
          description: Missing pasted text or oversized payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Missing Gemini API key or server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Missing GEMINI_API_KEY. Add your Gemini API key to backend/.env.
  /api/gemini/visit-kit:
    post:
      tags:
        - Gemini
      summary: Visit prep — opening script, phrases, checklist, reminder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VisitKitRequest"
      responses:
        "200":
          description: Structured visit preparation content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VisitKitResponse"
        "400":
          description: Missing situation or oversized payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Missing Gemini API key or server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Missing GEMINI_API_KEY. Add your Gemini API key to backend/.env.
components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - service
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: nerp-api
    CreateCommandRequest:
      type: object
      required:
        - command
      properties:
        command:
          type: string
          minLength: 1
          example: restart-worker
    Command:
      type: object
      required:
        - id
        - command
        - status
        - created_at
      properties:
        id:
          type: integer
          example: 1
        command:
          type: string
          example: restart-worker
        status:
          type: string
          example: sent
        created_at:
          type: string
          format: date-time
          example: "2026-05-09T17:00:00.000Z"
    ValidateUserRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          minLength: 1
          example: mockuser
        password:
          type: string
          minLength: 1
          example: mockpassword
    ValidatedUser:
      type: object
      required:
        - id
        - username
      properties:
        id:
          type: integer
          example: 1
        username:
          type: string
          example: mockuser
    ValidateUserResponse:
      type: object
      required:
        - valid
        - user
      properties:
        valid:
          type: boolean
          example: true
        user:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/ValidatedUser"
    ClaudeRequest:
      type: object
      required:
        - question
      properties:
        question:
          type: string
          minLength: 1
          example: What is the NERP stack?
    ClaudeResponse:
      type: object
      required:
        - answer
        - model
      properties:
        answer:
          type: string
          example: NERP is a Node, Express, React, and PostgreSQL stack.
        model:
          type: string
          example: claude-sonnet-4-20250514
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          example: Something went wrong on the server.
    CareChatRequest:
      type: object
      required:
        - message
      properties:
        displayName:
          type: string
          description: Optional name or nickname for tone.
        message:
          type: string
          minLength: 1
        history:
          type: array
          description: Recent turns for continuity (client-managed).
          items:
            type: object
            required:
              - role
              - text
            properties:
              role:
                type: string
                enum:
                  - user
                  - model
              text:
                type: string
        intakeContext:
          type: object
          description: Saved ZIP and care type from the client when available.
          properties:
            zipCode:
              type: string
            careType:
              type: string
    CareChatResponse:
      type: object
      required:
        - answer
      properties:
        answer:
          type: string
    ReadingHelperRequest:
      type: object
      required:
        - pastedText
      properties:
        pastedText:
          type: string
          minLength: 1
        worryNote:
          type: string
          description: Optional note about what worries the reader most.
        intakeContext:
          type: object
          properties:
            zipCode:
              type: string
            careType:
              type: string
    ReadingHelperResponse:
      type: object
      required:
        - plainSummary
        - keyTerms
        - questionsForYourProvider
      properties:
        plainSummary:
          type: string
        keyTerms:
          type: array
          items:
            type: object
            required:
              - term
              - plainEnglish
            properties:
              term:
                type: string
              plainEnglish:
                type: string
        questionsForYourProvider:
          type: array
          items:
            type: string
    VisitKitRequest:
      type: object
      required:
        - situation
      properties:
        situation:
          type: string
          minLength: 1
        intakeContext:
          type: object
          properties:
            zipCode:
              type: string
            careType:
              type: string
    VisitKitResponse:
      type: object
      required:
        - howToStartTheConversation
        - phrasesYouCanUse
        - prepChecklist
        - reminder
      properties:
        howToStartTheConversation:
          type: string
        phrasesYouCanUse:
          type: array
          items:
            type: string
        prepChecklist:
          type: array
          items:
            type: string
        reminder:
          type: string
