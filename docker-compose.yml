services:
  db:
    image: postgres:16-alpine
    container_name: nerp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nerp_user
      POSTGRES_PASSWORD: nerp_password
      POSTGRES_DB: nerp_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nerp_user -d nerp_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
